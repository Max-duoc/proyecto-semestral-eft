name: CI/CD Pipeline

# Se ejecuta en cada push a main, o manualmente desde la pestaña Actions
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: proyecto-cluster-ets

jobs:

  # ============================================
  # JOB 1: Backend Despachos - build, test, push
  # ============================================
  build-and-push-despachos:
    name: Backend Despachos
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Ejecutar tests
        run: mvn test -B

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login en Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push de la imagen
        env:
          ECR_REPO: ${{ steps.ecr-login.outputs.registry }}/proyecto-back-despachos
        run: |
          docker build -t $ECR_REPO:${{ github.sha }} -t $ECR_REPO:latest .
          docker push $ECR_REPO:${{ github.sha }}
          docker push $ECR_REPO:latest

  # ============================================
  # JOB 2: Backend Ventas - build, test, push
  # ============================================
  build-and-push-ventas:
    name: Backend Ventas
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back-Ventas_SpringBoot/Springboot-API-REST
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Ejecutar tests
        run: mvn test -B

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login en Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push de la imagen
        env:
          ECR_REPO: ${{ steps.ecr-login.outputs.registry }}/proyecto-back-ventas
        run: |
          docker build -t $ECR_REPO:${{ github.sha }} -t $ECR_REPO:latest .
          docker push $ECR_REPO:${{ github.sha }}
          docker push $ECR_REPO:latest

  # ============================================
  # JOB 3: Frontend - build y push
  # ============================================
  build-and-push-front:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front_despacho
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: front_despacho/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Build de producción (Vite)
        run: npm run build

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login en Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push de la imagen
        env:
          ECR_REPO: ${{ steps.ecr-login.outputs.registry }}/proyecto-front-despacho
        run: |
          docker build -t $ECR_REPO:${{ github.sha }} -t $ECR_REPO:latest .
          docker push $ECR_REPO:${{ github.sha }}
          docker push $ECR_REPO:latest

  # ============================================
  # JOB 4: Deploy - fuerza a ECS a levantar las imágenes nuevas
  # ============================================
  deploy:
    name: Deploy a ECS
    runs-on: ubuntu-latest
    needs: [build-and-push-despachos, build-and-push-ventas, build-and-push-front]
    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Forzar nuevo deployment - back-despachos
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service back-despachos \
            --force-new-deployment

      - name: Forzar nuevo deployment - back-ventas
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service back-ventas \
            --force-new-deployment

      - name: Forzar nuevo deployment - front-despacho
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service front-despacho \
            --force-new-deployment